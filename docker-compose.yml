version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: network_dashboard_postgres
    environment:
      POSTGRES_DB: network_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
